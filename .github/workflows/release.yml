name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bunx tsc --noEmit

      - name: Build binaries
        run: |
          bun build ./src/index.tsx --compile --target=bun-linux-x64 --outfile podview-linux-x64
          bun build ./src/index.tsx --compile --target=bun-linux-arm64 --outfile podview-linux-arm64
          bun build ./src/index.tsx --compile --target=bun-darwin-arm64 --outfile podview-darwin-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            podview-linux-x64
            podview-linux-arm64
            podview-darwin-arm64
